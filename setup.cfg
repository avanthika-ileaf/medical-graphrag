[flake8]
max-line-length = 120
# E402: module level import not at top of file
#   — intentional throughout: sys.path.insert() must precede local package imports
#     in all standalone scripts and modules that run without package installation.
# E221: multiple spaces before operator
#   — used intentionally for vertical alignment in config blocks and data tables.
extend-ignore = E402, E221

per-file-ignores =
    # Static data file with intentionally wide inline dicts; reformatting
    # would harm readability without any functional benefit.
    scripts/generate_medical_data.py: E501, E231
